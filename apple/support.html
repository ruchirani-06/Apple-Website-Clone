<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apple Support</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!--Bootestrap js-->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">



  <style>

   

    body{
      background:#000;
      color:#fff;
      font-family:sans-serif;
      overflow-x:hidden;
    }

    /*  NAVBAR */

   nav{
  background:#000;

}
.navbar-brand img{
      height:28px;
    }

    .nav-link{
      color:#d1d1d1 ;
      transition:0.3s;
    }

    .nav-link:hover{
      color:#fff ;
    }

    /* HERO SECTION */

    .hero-section{
      min-height:85vh;

      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:40px 20px;
    }

    .support img{
      width:120px;
      margin-bottom:25px;
    }

    .support .title{
      font-size:clamp(2.5rem,6vw,5rem);
      font-weight:700;
      margin-bottom:16px;
    }

    .support .subtitle{
      font-size:clamp(1rem,2vw,1.3rem);
      color:#9ca3af;
    }

    /* IMAGE AND FORM SECTION */


.image-section{
  padding:70px 5%;
}

/* =========================
   ROW FIX
========================= */

.image-section .row{
  align-items:center;
}

/* =========================
   IMAGE SIDE
========================= */

.image-side{
  display:flex;
  justify-content:center;
  align-items:center;
}

/* IMAGE */

.image-side img{
  width:100%;
  max-width:420px;

  height:550px;

  object-fit:contain;

  transition:0.4s ease;
}

.image-side img:hover{
  transform:scale(1.03);
}

/* =========================
   FORM SIDE
========================= */

.form-side{
  display:flex;
  justify-content:center;
  align-items:center;
}

/* FORM */

.contact-form{
  width:100%;
  max-width:420px;

  min-height:550px; 

  display:flex;
  flex-direction:column;
  justify-content:center;

  gap:16px;
}

/* TEXT */

.contact-form p{
  font-size:16px;
  line-height:1.7;
  color:#e5e5e5;
}

/*  INPUT FIELDS */

.contact-form input,
.contact-form textarea{
  width:100%;

  background:transparent;

  border:1px solid #2f2f2f;
  border-radius:16px;

  padding:16px 18px;

  color:#fff;
  font-size:15px;

  outline:none;

  transition:0.3s ease;
}

/* TEXTAREA */

.contact-form textarea{
  min-height:140px;
  resize:none;
}



.contact-form input:-webkit-autofill,
.contact-form input:-webkit-autofill:hover,
.contact-form input:-webkit-autofill:focus,
.contact-form textarea:-webkit-autofill{

  -webkit-box-shadow:0 0 0 1000px #111 inset;
  -webkit-text-fill-color:#fff;

  border:1px solid #2f2f2f;

  transition:background-color 5000s ease-in-out 0s;
}

/* Focus */

.contact-form input:focus,
.contact-form textarea:focus{

  border:1px solid transparent;

  background-image:
    linear-gradient(#111,#111),
    linear-gradient(135deg,#a855f7,#ec4899,#c084fc);

  background-origin:border-box;
  background-clip:padding-box,border-box;

  box-shadow:0 0 0 3px rgba(168,85,247,0.18);
}

/* =========================
   BUTTON
========================= */

.contact-form button{
  background:#2563EB;
  color:#fff;

  border:none;

  padding:16px;

  border-radius:50px;

  font-size:16px;
  font-weight:600;

  cursor:pointer;

  transition:0.3s ease;
}

.contact-form button:hover{
  background:#3c72e5;
  transform:translateY(-3px);
}

/* MESSAGE */

#Message{
  font-size:14px;
  margin-top:5px;
}

/* =========================
   TABLET
========================= */

@media (max-width:992px){

  .image-side img{
    max-width:340px;
    height:480px;
  }

  .contact-form{
    min-height:480px;
  }
}

/*  MOBILE */

@media (max-width:768px){

  .image-section{
    padding:50px 5%;
  }

  .image-side{
    margin-bottom:30px;
  }

  .image-side img{
    max-width:260px;
    height:auto;
  }

  .contact-form{
    min-height:auto;
  }
}

    /* FOOTER */

    .footer-section{
      padding:30px 0;
      margin-top:40px;

      border-top:1px solid #1f1f1f;
    }

    .footer-text{
      margin:0;

      text-align:center;

      color:#9ca3af;

      font-size:14px;

      letter-spacing:0.5px;
    }

    /* RESPONSIVE */

    @media(max-width:992px){

      .hero-section{
        min-height:70vh;
      }

      .support .title{
        font-size:48px;
      }

      .image-side img{
        max-width:380px;
      }
    }

    @media(max-width:768px){

      .hero-section{
        min-height:60vh;
        padding:50px 20px;
      }

      .support img{
        width:80px;
      }

      .support .title{
        font-size:38px;
      }

      .image-section{
        padding:40px 20px;
        gap:30px;
      }

      .contact-form{
        gap:15px;
      }

      .contact-form p{
        text-align:center;
        font-size:14px;
      }

      .contact-form input,
      .contact-form textarea{
        padding:14px 16px;
        font-size:14px;
      }

      .image-side img{
        max-width:280px;
      }

      .footer-text{
        font-size:12px;
        line-height:1.6;
      }
    }

  </style>
</head>

<body>

  <!-- NAVBAR -->

  <nav class="navbar navbar-expand-lg navbar-dark">

    <div class="container-fluid">

      <a class="navbar-brand ms-3" href="index.html">
        <img src="img/logo.png" alt="Apple Logo">
      </a>

      <button class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navMenu">

        <span class="navbar-toggler-icon"></span>

      </button>

      <div class="collapse navbar-collapse" id="navMenu">

        <ul class="navbar-nav mx-auto gap-lg-4">

          <li class="nav-item">
            <a class="nav-link" href="index.html">Overview</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="shop.html">Shop</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">Mac</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">iPad</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">iPhone</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">Watch</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="support.html">Support</a>
          </li>

        </ul>

        <ul class="navbar-nav me-3 flex-row align-items-center">

          <li class="nav-item me-3">
            <a class="nav-link" href="#">
              <i class="bi bi-search"></i>
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">
              <i class="bi bi-bag"></i>
            </a>
          </li>

        </ul>

      </div>

    </div>

  </nav>

  <!-- HERO SECTION -->

  <section class="hero-section">

    <div class="container">

      <div class="support">

        <img src="img/supportlogo.png" alt="Support">

        <h1 class="title">Apple Support</h1>

        <p class="subtitle">
          Need help? Start here.
        </p>

      </div>

    </div>

  </section>

  <!-- IMAGE + FORM SECTION -->

  <section class="image-section">

  <div class="container">
    <div class="row align-items-center">

      <!-- IMAGE SIDE -->
      <div class="col-lg-6 col-md-6 col-12">
        <div class="image-side">
          <img src="img/supportphone.png" alt="Phone Image" class="img-fluid">
        </div>
      </div>

      <!-- FORM SIDE -->
      <div class="col-lg-6 col-md-6 col-12">

        <div class="form-side">

          <form class="contact-form" onsubmit="signup(event)">

            <p>
              Questions or concerns? Our support team is here for you.
            </p>

            <input type="text" placeholder="Your Name" id="name">

            <input type="email" placeholder="Email Address" id="email">

            <input type="text" placeholder="Device" id="device">

            <textarea placeholder="Your Message" id="message"></textarea>

            <button type="submit">Send Message</button>

            <p id="Message"></p>

          </form>

        </div>

      </div>

    </div>
  </div>

</section>
  <!-- FOOTER -->

  <footer class="footer-section">

    <div class="container">

      <p class="footer-text">
        © 2026 iPhone17e. All rights reserved. Designed by Ruchi Rani
      </p>

    </div>

  </footer>

  <!-- JAVASCRIPT -->

  <script>

    function signup(event){

      event.preventDefault();

  

      var name = document.getElementById('name').value;
      var email = document.getElementById('email').value;
      var device = document.getElementById('device').value;
      var messageText = document.getElementById('message').value;

      var message = document.getElementById('Message');


      if(!name || !email || !device || !messageText){

        message.style.color = "red";
        message.textContent = "Please fill in all fields";

        return false;
      }

      message.style.color = "lightgreen";
      message.textContent = "Message sent successfully!";


      return true;
    }

  </script>

  

</body>
</html>
